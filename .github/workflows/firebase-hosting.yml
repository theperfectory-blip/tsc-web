name: Deploy a Firebase Hosting

# Cada push a la rama main publica la web automáticamente.
on:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TSC_WEB_YUNA }}
          channelId: live
          projectId: tsc-web-yuna
      # NOTA: las reglas de Firestore (firebase/firestore.rules) se despliegan
      # manualmente con `firebase deploy --only firestore:rules`. La service
      # account de Hosting no tiene permiso IAM para Firestore (403), así que
      # no se pueden desplegar desde este workflow sin añadir el rol
      # "Firebase Rules Admin" a esa cuenta en Google Cloud Console.
