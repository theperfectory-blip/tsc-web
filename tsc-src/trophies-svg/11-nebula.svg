  <rect x="60" y="166" width="80" height="9" rx="1" fill="url(#wood)" stroke="#2E1B10" stroke-width="0.4"/>
  <rect x="54" y="175" width="92" height="10" rx="1" fill="url(#wood)" stroke="#2E1B10" stroke-width="0.4"/>
