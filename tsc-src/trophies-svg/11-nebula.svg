    <rect x="82" y="55" width="2" height="5"/>
    <rect x="88" y="55" width="2" height="5"/>
    <rect x="94" y="55" width="2" height="5"/>
    <rect x="100" y="55" width="2" height="5"/>
    <rect x="106" y="55" width="2" height="5"/>
    <rect x="112" y="55" width="2" height="5"/>
    <rect x="118" y="55" width="2" height="5"/>
    <rect x="124" y="55" width="2" height="5"/>
  </g>
  <!-- Asas laterales (tapas axiales) -->
  <rect x="60" y="54" width="12" height="8" fill="url(#chr)" stroke="#5A5A62" stroke-width="0.4"/>
  <rect x="53" y="50" width="7" height="16" rx="1" fill="url(#chr)" stroke="#5A5A62" stroke-width="0.4"/>
  <rect x="128" y="54" width="12" height="8" fill="url(#chr)" stroke="#5A5A62" stroke-width="0.4"/>
  <rect x="140" y="50" width="7" height="16" rx="1" fill="url(#chr)" stroke="#5A5A62" stroke-width="0.4"/>
