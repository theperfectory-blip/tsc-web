    <line x1="100" y1="87" x2="100" y2="103"/>
    <line x1="104" y1="87" x2="110" y2="103"/>
  </g>
  <ellipse cx="100" cy="104" rx="22" ry="3.5" fill="url(#chr)" stroke="#5A5A62" stroke-width="0.4"/>
  <ellipse cx="100" cy="109" rx="25" ry="3.5" fill="url(#chr)" stroke="#5A5A62" stroke-width="0.4"/>
