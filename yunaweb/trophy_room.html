async function dbGetAll(store, filterFn) {
  let rows;
  if (store === 'teams') rows = MOCK.teams.slice();
  else if (store === 'palmares') rows = MOCK.palmares.slice();
  else rows = [];
  if (typeof filterFn === 'function') rows = rows.filter(filterFn);
  return rows;
}
async function dbGet(store, id) {
  const arr = (store === 'teams' ? MOCK.teams : store === 'palmares' ? MOCK.palmares : []);
  return arr.find(r => r.id === id);
}
async function dbAdd(store, rec) {
  const arr = (store === 'teams' ? MOCK.teams : MOCK.palmares);
  rec.id = (arr.reduce((m, r) => Math.max(m, r.id||0), 0) || 0) + 1;
  arr.push(rec);
  return rec.id;
}
async function dbDelete(store, id) {
  const arr = (store === 'teams' ? MOCK.teams : MOCK.palmares);
  const i = arr.findIndex(r => r.id === id);
  if (i >= 0) arr.splice(i, 1);
}
